<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Resources Login</title>
    <link rel="stylesheet" href="project.css">
</head>

<body>

    <div class="login-container">

        <h1>Student Resources Login</h1>

        <form id="loginForm" action="#" method="post">

            <label for="username">Username :</label>
            <input type="text" id="username" name="username" required>

            <label for="email">Email :</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Password :</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Send OTP</button>

            <p>Don't have an account? <a href="signup.html">Sign up</a></p>

            <div id="otpSection" style="display: none;">
                <label>Enter OTP :</label>
                <input type="text" id="otp" placeholder="Enter the 6-digit OTP">

                <button type="button" onclick="verifyOTP()">Verify OTP</button>
            </div>

            <p id="verificationMessage"></p>


        </form>

    </div>

    <script>

        // Run validation when form is submitted
        document.getElementById("loginForm").addEventListener("submit", function (event) {
            event.preventDefault();

            let username = document.getElementById("username").value.trim();
            let email = document.getElementById("email").value.trim();
            let password = document.getElementById("password").value.trim();

            // Basic validation
            if (username.length < 3) {
                alert("Username must be at least 3 characters long.");
                return;
            }
            if (!email.includes("@") || !email.includes(".")) {
                alert("Please enter a valid email address.");
                return;
            }
            if (password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }

            // Send OTP
            fetch('http://localhost:5000/send-verification', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: email })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert("OTP sent to your email. Please check and enter the OTP.");
                        document.getElementById("otpSection").style.display = "block";
                    } else {
                        alert("Failed to send OTP. Please try again.");
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("Error sending OTP.");
                });
        });

        function verifyOTP() {
            let otp = document.getElementById("otp").value.trim();
            let email = document.getElementById("email").value.trim();

            if (otp === "") {
                alert("Please enter the OTP.");
                return;
            }

            if (!email.includes("@") || !email.includes(".")) {
                alert("Please enter a valid email address before verifying OTP.");
                return;
            }

            fetch('http://localhost:5000/verify-otp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ otp: otp, email: email })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById("verificationMessage").textContent = "OTP Verified Successfully! Logging in...";
                        document.getElementById("verificationMessage").style.color = "green";
                        localStorage.setItem("userLoggedIn", "true");
                        // Redirect after a short delay
                        setTimeout(() => {
                            window.location.href = "resources.html";
                        }, 1000);
                    } else {
                        document.getElementById("verificationMessage").textContent = "Invalid OTP. Please try again.";
                        document.getElementById("verificationMessage").style.color = "red";
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("Error verifying OTP.");
                });
        }


    </script>

</body>

</html>
